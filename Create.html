<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>其他作品</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 背景：渐变打底 + 浅色网格覆层 */
            background: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2) 1px, transparent 1px, transparent 20px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2) 1px, transparent 1px, transparent 20px),
                linear-gradient(135deg, #DAEDFE 0%, #A6D1FF 100%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            /* 让body成为垂直居中的容器 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 防止内容溢出 */
            overflow: auto;
            position: relative;
            
        }

        /* 标题：文字渐变色 */
        .page-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding:3px 0 12px 0;
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            max-width: 300px;
            width: 100%;
            flex: 0 0 auto;
            margin-left: 300px;
            letter-spacing: 2px; /* 横向间距 */
        }
        /* 返回首页按钮 */
        .back-home-btn {
            position: absolute;
            top: 6px;
            left: 15px;
            width: 120px;
            padding:8px 10px 10px 10px;
            background-color: #c1d9ec;
            color: #6b89a3;
            /* border: 1px solid #ffffffd3; */
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            z-index: 99;
            transition: background-color 0.3s;
        }
        .back-home-btn:hover {
            background: linear-gradient(135deg, #0a95ff 0%, #053efa 100%);;
            color: #FFF;
        }

        /* 主容器：拆分为主图+左侧竖向缩略图 */
        .main-container {
            position: relative;
            /* 替换固定宽度为最大宽度+自适应宽度，适配不同屏幕 */
            width: min(1907px, 100% - 30px); /* 100%宽度减去左右各15px边距，最大不超过1587px */
            height: calc(100% - 50px);
            max-height: 900px;
            /* 水平居中（flex父级已处理，这里做兜底） */
            margin: 0 auto;
            flex: 1 1 auto;
            /* 核心：横向拆分主图和缩略图 */
            display: flex;
            gap: 15px;
            /* 新增：限制最小高度，避免内容过小 */
            min-height: 400px;
            /* 新增：确保容器本身在父级中垂直居中 */
            align-self: center;
            padding-bottom: 10px;
        }

        /* 响应式适配：小屏幕下调整布局 */
@media (max-width: 1600px) {
    .main-container {
        width: min(1200px, 100% - 30px);
        max-height: 800px;
    }
}

@media (max-width: 768px) {
    .main-container {
        /* 小屏幕改为竖向排列 */
        flex-direction: column;
        height: auto;
        min-height: 300px;
    }
}
        /* 左侧缩略图容器（竖向） */
        .thumb-container {
            width: 280px;
            height: 100%;
            /* 竖向布局核心 */
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            scroll-behavior: smooth;
            /* 隐藏滚动条 */
            -ms-overflow-style: none;
            scrollbar-width: none;
            /* 半透明遮罩背景 */
            background-color: rgba(255, 255, 255, 1);
            padding: 10px;
            border-radius: 8px;
        }
        .thumb-container::-webkit-scrollbar {
            display: none;
        }
        /* 缩略图项（竖向） */
        .thumb-item {
            width: 100%;
            height: 150px;
            border: 2px solid #fff;
            cursor: pointer;
            flex-shrink: 0;
            opacity: 0.7;
            transition: all 0.3s;
        }
        .thumb-item:hover, .thumb-item.active {
            border-color: #007bff;
            opacity: 1;
        }
        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* 主图展示容器 */
        .main-img-container {
            position: relative;
            /* 占满剩余宽度 */
            flex: 1;
            height: 100%;
            overflow: hidden;
            border: 6px solid #fff;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .img-container {
            position: relative;
            width: 80%;
            margin: 0 auto;
            max-width: 1200px;
        }
        .main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* 主图左右切换箭头 */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px; /* 容器尺寸不变 */
            height: 45px; /* 容器尺寸不变 */
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px; /* 你想要的小箭头尺寸 */
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.3s;
            /* 新增：强制图标垂直对齐，解决消失问题 */
            line-height: 1;
            padding:0 0 3px 0;
            border: none;
        }
        /* 可选：hover时加深背景，让箭头更明显 */
        .arrow:hover {
            background-color: rgba(0, 0, 0, 0.6);
        }
        .prev-arrow {
            left: 15px;
        }
        .next-arrow {
            right: 15px;
        }

         /* ========== 水印样式 ========== */
         .watermark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 不影响鼠标交互 */
            z-index: 2; /* 水印在背景图上，遮罩/文字下 */
            /* 平铺水印 */
            /* background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 90px,
                rgba(255, 255, 255, 0.05) 50px,
                rgba(255, 255, 255, 0.1) 100px
            );  */
        }
        /* 水印文字内容（通过伪元素生成） */
        .watermark::after {
            content: "©TDFDesign"; /* 替换为你的水印内容 */
            position: absolute;
            /* 定位到右下角：bottom+right 控制边距 */
            bottom:25px;
            right: 20px;
            /* 不影响鼠标交互 */
            pointer-events: none;
            /* 水印层级：在图片上方，按钮下方 */
            z-index: 2;
            /* 水印文字样式 */
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3); /* 白色半透明，适配不同图片 */
            font-weight: bold;
            letter-spacing: 2px;
            /* 取消旋转（如需旋转保留：transform: rotate(0deg);） */
            transform: rotate(0deg);
            white-space: nowrap; /* 防止文字换行 */
            /* 核心：通过 letter-spacing + line-height 控制平铺密度 */
            letter-spacing: 2px; /* 横向间距 */
            line-height: 10px;    /* 纵向间距 */
            /* 填充空白区域，确保完全平铺 */
            white-space: pre-wrap;
            word-break: break-all;
            opacity: 0.8;
            
        }
        @keyframes itemSlideIn {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 自适应调整 */
        @media (max-width: 768px) {
            .back-home-btn {
                width: 80px;
                height: 35px;
                font-size: 14px;
            }
            .page-title {
                font-size: 22px;
                margin-bottom: 10px;
                padding-right: 90px;
            }
            .main-container {
                gap: 10px;
            }
            .thumb-container {
                width: 60px;
                padding: 8px;
            }
            .thumb-item {
                height: 45px;
            }
            .arrow {
                width: 35px;
                height: 35px;
                font-size: 14px; /* 移动端配套小尺寸 */
                line-height: 1; /* 同步保留垂直对齐 */
            }
             /* 移动端水印适配 */
             .watermark {
                font-size: 20px;
                line-height: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- 返回首页按钮 -->
    <button class="back-home-btn" onclick="window.location.href='index.html'">
        <span><</span>
        <span>返回首页</span>
    </button>

    <!-- 页面标题 -->
    <h1 class="page-title">个人创作合集</h1>

   <!-- 主容器：左侧缩略图 + 右侧主图 -->
<div class="main-container">
    <!-- 左侧竖向缩略图容器（动态生成内容） -->
    <div class="thumb-container" id="thumbContainer"></div>

    <!-- 右侧主图展示区域 -->
    <div class="main-img-container">
        <div class="watermark"></div>
        <div class="arrow prev-arrow" onclick="changeImg(-1)">&lt;</div>
        <img src="" alt="主图" class="main-img" id="mainImg">
        <div class="arrow next-arrow" onclick="changeImg(1)">&gt;</div>
    </div>
</div>

<script>
    const imgList = [
        "./sj/main1.jpg",
        "./sj/main2.jpg",
        "./sj/main3.jpg",
        "./sj/main4.jpg",
        "./sj/main5.jpg",
        "./sj/main6.jpg",
        "./sj/main6.1.jpg",
        "./sj/main6.2.jpg",
        "./sj/main6.3.jpg",
        "./sj/main6.4.jpg",
        "./sj/main6.5.jpg",        
        "./sj/main7.jpg",
        "./sj/main8.jpg",
        "./sj/main9.jpg",
        "./sj/main10.jpg",
        "./sj/main11.jpg",
        "./sj/main12.jpg",
        "./sj/main13.jpg",
        "./sj/main14.jpg",
        "./sj/main15.jpg",
        "./sj/main16.jpg",
        "./sj/main17.jpg"
    ]

    let currentIndex = 0;
    const mainImg = document.getElementById("mainImg");
    const thumbContainer = document.getElementById("thumbContainer");
    let thumbItems = []; 


    window.onload = initImageViewer;


    function initImageViewer() {
        generateThumbItems(); 
        updateMainImg();      
    }


    function generateThumbItems() {
        thumbContainer.innerHTML = "";
        
        imgList.forEach((imgSrc, index) => {

            const thumbItem = document.createElement("div");
            thumbItem.className = `thumb-item ${index === 0 ? "active" : ""}`; 
            thumbItem.onclick = () => showImg(index); 
            

            const thumbImg = document.createElement("img");
            thumbImg.src = imgSrc;
            thumbImg.alt = `缩略图${index + 1}`;
            thumbImg.className = "thumb-img";
            

            thumbItem.appendChild(thumbImg);
            thumbContainer.appendChild(thumbItem);
            

            thumbItems.push(thumbItem);
        });
    }


    function showImg(index) {

        if (index < 0 || index >= imgList.length) return;
        
        currentIndex = index;
        updateMainImg();
        scrollToActiveThumb();
    }

    function changeImg(direction) {
        currentIndex += direction;
        

        if (currentIndex < 0) {
            currentIndex = imgList.length - 1;
        } else if (currentIndex >= imgList.length) {
            currentIndex = 0;
        }
        
        updateMainImg();
        scrollToActiveThumb();
    }


    function updateMainImg() {

        mainImg.src = imgList[currentIndex];
        

        thumbItems.forEach((item, index) => {
            if (index === currentIndex) {
                item.classList.add("active");
            } else {
                item.classList.remove("active");
            }
        });
    }


    function scrollToActiveThumb() {
        const activeThumb = thumbItems[currentIndex];
        if (activeThumb) {
            activeThumb.scrollIntoView({
                behavior: "smooth",
                block: "center"
            });
        }
    }



        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();

        });


        document.addEventListener('dragstart', function(e) {
            if (e.target.tagName === 'IMG' || e.target.classList.contains('accordion-item')) {
                e.preventDefault();
            }
        });


        document.addEventListener('keydown', function(e) {

            if (e.key === 'F12') {
                e.preventDefault();
            }

            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
            }

            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
            }
        });


        function addImageWatermark(imgSelector, watermarkText) {
            const imgs = document.querySelectorAll(imgSelector);
            imgs.forEach(img => {

                const watermarkDiv = document.createElement('div');
                watermarkDiv.className = 'watermark';
                watermarkDiv.style.position = 'absolute';
                watermarkDiv.style.top = '0';
                watermarkDiv.style.left = '0';
                watermarkDiv.style.width = '100%';
                watermarkDiv.style.height = '100%';
                watermarkDiv.style.pointerEvents = 'none';
                watermarkDiv.style.zIndex = '2';
                watermarkDiv.style.fontSize = '20px';
                watermarkDiv.style.color = 'rgba(255,255,255,0.2)';
                watermarkDiv.style.transform = 'rotate(-45deg)';
                watermarkDiv.innerHTML = `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-45deg);white-space:nowrap;">${watermarkText}</div>`;
                

                const parent = img.parentElement;
                parent.style.position = 'relative';

                parent.appendChild(watermarkDiv);
            });
        }

    </script>
</body>
</html>
